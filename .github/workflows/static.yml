# Bygger Next.js (statisk eksport) og deployer ./out til GitHub Pages.
name: Deploy Next.js to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          # Project Pages serveres under /<repo>/ – sett basePath deretter.
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Supabase: legg disse inn som repo-variabler (Settings → Secrets and
          # variables → Actions → Variables). Den publiserbare nøkkelen er
          # trygg å eksponere; secret-nøkkelen skal ALDRI legges her.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_TABLE: ${{ vars.SUPABASE_TABLE }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
